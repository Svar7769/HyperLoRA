# CASH fine-tuning configuration for pressure_plate
# Uses the CASH policy path with pressure-plate environment settings.

device:
  use_cuda: false
  cuda_device: 0

env:
  scenario_name: "pressure_plate"
  num_agents: 3
  max_agents: 3
  num_envs: 128
  continuous_actions: true
  penalise_by_time: false
  share_reward: true
  distance_shaping_coef: 0.0

  # Pressure plate specific parameters
  n_ground_robots: 3
  x_semidim: 2.0
  y_semidim: 2.0
  plate_radius: 0.3
  plate_margin: 0.8
  random_plate_positions: true
  door_size: 0.9
  goal_radius: 0.3
  with_drone: false
  use_global_obs: true
  reward_type: "sparse"
  plate_left_reward: 0.2
  plate_right_reward: 1.0
  goal_reward: 100.0
  time_penalty: 0.0

  mixed_agent_training: false
  min_agents: 2
  per_env_agent_variation: false

  # Keep pressure-plate training spawn behavior consistent with existing setup.
  training_spawn_side: "left"

  # Environment still supports fixed speeds even though pressure_plate uses no capability context in train.py.
  use_fixed_capabilities: true
  fixed_food_positions: false
  fixed_capabilities:
    speed: [0.8, 1.0, 1.2]

training:
  total_timesteps: 1.0e7

  # effective_timesteps = num_episodes * rollout_steps * num_envs
  # 391 * 200 * 128 = 10,009,600 (~1.0e7)
  num_episodes: 200
  rollout_steps: 200
  log_interval: 10
  seed: 34210

  learning_rate: 2.0e-3
  anneal_lr: true
  ppo_epochs: 4
  use_minibatches: true
  num_minibatches: 4
  shuffle_minibatches: true
  gamma: 0.99
  gae_lambda: 0.95
  ppo_clip_epsilon: 0.2
  scale_clip_epsilon: false
  entropy_coef: 0.01
  value_loss_coef: 0.5
  max_grad_norm: 0.5

  hypernetwork_grad_norm: 0.5
  critic_grad_norm: 0.5

  clip_global_state: false
  clip_global_state_min: -100.0
  clip_global_state_max: 100.0

  use_diversity_control: false
  target_snd: 1.0
  snd_moving_average_coef: 0.1

evaluation:
  eval_interval: 50
  num_eval_episodes: 10
  max_eval_steps: 200

model:
  # Activate CASH baseline path
  use_cash: true
  use_hypernetwork: false
  use_dico: false
  use_gru_policy: true

  # Policy / RNN sizes
  fc_dim_size: 128
  gru_hidden_dim: 128
  gru_num_layers: 1
  policy_hidden_dims: [128, 128]
  action_dim: 2
  log_std_min: -2.0
  log_std_max: 0.0
  min_std: 0.3

  # pressure_plate uses context_dim=0 in train.py (no capability context)
  use_capability_context: false
  use_onehot_context: false
  use_positional_context: false
  use_lidar_context: false
  task_embed_dim: 0
  target_snd_dim: 0

  # CASH hyper-adapter
  cash_hyper_hidden_dim: 64
  cash_hyper_layers: 4
  cash_decoder_hidden_dim: 64
  cash_use_two_layer_decoder: true

  # Critic
  critic_hidden_dim: 128
  critic_num_layers: 2
  use_shared_critic: false

optimizer:
  type: "adam"
  learning_rate: 2.0e-3
  hn_learning_rate: 2.0e-3
  critic_learning_rate: 2.0e-3
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-5

logging:
  log_dir: "./logs"
  checkpoint_dir: "./checkpoints"
  save_interval: 100
  wandb_project: "hyperlora-vmas"
  wandb_entity: null

experiment:
  name: "cash_pressure_plate_seed{seed}"
  description: "CASH on pressure_plate with global observations and sparse staged rewards"
  tags: ["cash", "pressure_plate", "coordination"]
